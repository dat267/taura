name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: amd64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch: arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    outputs:
      bundle-path: ${{ steps.set_bundle_path.outputs.path }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install Linux system deps (amd64)
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install Linux cross-compilation deps (arm64)
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            pkg-config-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libappindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libssl-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            patchelf
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: Setup MSVC arm64 toolchain (Windows)
        if: matrix.os == 'windows-latest' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & "$vswhere" -latest -property installationPath
          $vcvarsall = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
          cmd /c "`"$vcvarsall`" amd64_arm64 > nul 2>&1 && set" | ForEach-Object {
            if ($_ -match '^(\w+)=(.*)') {
              echo "$($matches[1])=$($matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Build Tauri bundle
        id: build
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Set bundle path
        id: set_bundle_path
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "path=src-tauri/target/${{ matrix.target }}/release/bundle/appimage" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "path=src-tauri/target/${{ matrix.target }}/release/bundle/msi" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "path=src-tauri/target/${{ matrix.target }}/release/bundle/dmg" >> $GITHUB_OUTPUT
          fi

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: taura-${{ matrix.arch }}-${{ matrix.os }}
          path: ${{ steps.set_bundle_path.outputs.path }}
          if-no-files-found: warn

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: ls -R taura-*/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: taura ${{ github.ref_name }}
          body: |
            ## taura ${{ github.ref_name }}

            | Platform | Architecture | Installer |
            |----------|-------------|----------|
            | Linux | amd64 | `taura-${{ github.ref_name }}-amd64.AppImage` |
            | Linux | arm64 | `taura-${{ github.ref_name }}-arm64.AppImage` |
            | Windows | amd64 | `taura-${{ github.ref_name }}-x64.msi` |
            | Windows | arm64 | `taura-${{ github.ref_name }}-arm64.msi` |
            | macOS | arm64 | `taura-${{ github.ref_name }}-aarch64.dmg` |
          draft: true
          files: taura-*/*
          fail_on_unmatched_files: false
